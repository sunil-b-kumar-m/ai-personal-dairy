services:
  - type: web
    name: ai-diary-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd server && pnpm install && pnpm run db:generate && pnpm run build
    startCommand: cd server && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-diary-db
          property: connectionString

databases:
  - name: ai-diary-db
    plan: free
    region: oregon
